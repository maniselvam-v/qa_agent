[pytest]
asyncio_mode = auto
markers =
    positive: positive test cases
    negative: negative test cases
    edge: edge case tests
    api: API layer tests
    ui: UI/browser tests
    etl: ETL pipeline tests
    performance: performance and load tests
    security: security tests
testpaths = generated_tests
addopts = --json-report --json-report-file=test_results.json -v --no-header -p no:warnings
